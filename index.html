<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Анализ Выгрузок</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Сравнение Выгрузок</h1>
    </header>

    <div class="cards-container">
      <div class="upload-card" id="card1">
        <div class="card-icon">📁</div>
        <h3>Файл 1</h3>
        <p class="period" id="period1">Ожидание файла...</p>
        <input type="file" id="file1" accept=".xlsx,.xls" onchange="handleFileSelect(1)">
        <div class="status" id="status1">Нажмите или перетащите файл</div>
      </div>

      <div class="upload-card" id="card2">
        <div class="card-icon">📁</div>
        <h3>Файл 2</h3>
        <p class="period" id="period2">Ожидание файла...</p>
        <input type="file" id="file2" accept=".xlsx,.xls" onchange="handleFileSelect(2)">
        <div class="status" id="status2">Нажмите или перетащите файл</div>
      </div>
    </div>

    <center>
      <button id="analyzeBtn" onclick="analyzeFiles()" disabled>🚀 Сравнить файлы</button>
    </center>

    <div id="result" class="result"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
